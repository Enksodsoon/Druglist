name: release-check

on:
  workflow_dispatch:
  push:
    paths:
      - 'index.html'
      - 'scripts/**'
      - 'source_workbooks/**'
      - '.github/workflows/release-check.yml'

jobs:
  release-prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: python -m pip install --upgrade pip openpyxl playwright
      - name: Install playwright browsers
        run: python -m playwright install --with-deps chromium firefox
      - name: Run release prepare (strict + regression guardrails)
        run: |
          python scripts/release_prepare.py \
            --min-price-rate 0.30 \
            --min-peds-rate 0.20 \
            --min-direct-generic-rate 0.04 \
            --min-peds-weighted-rate 0.12 \
            --max-price-regression 0.05 \
            --max-peds-regression 0.03 \
            --max-direct-generic-regression 0.03

      - name: Run UI smoke test
        run: python scripts/ui_smoke_test.py

      - name: Show trend summary
        run: cat build/release_trend_summary.md || true

      - name: Upload release history artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-history
          path: |
            build/release_history.json
            build/release_history.md
            artifacts/ui-smoke.png
