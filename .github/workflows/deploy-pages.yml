name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build or validate frontend artifact
        run: |
          PRIMARY_WORKBOOK="source_workbooks/Drug list for physician usage added -update 29022024.xlsx"
          if [ -f "$PRIMARY_WORKBOOK" ]; then
            python3 scripts/build_all.py
            python3 scripts/validate_engine.py
            python3 scripts/build_dist.py
          elif [ -d dist ]; then
            python3 scripts/build_dist.py --validate-only
          else
            echo "Primary workbook is absent in CI and no committed dist/ artifact was found."
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
